<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" href="/icons/icon-192.png">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
    <title>Bluffi - Ohjain</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d0118; color: white; text-align: center; padding: 20px; margin: 0; }
        .screen { display: none; }
        .active { display: block; }
        .host-guide { background: rgba(0, 212, 255, 0.1); border: 1px solid #00d4ff; padding: 15px; border-radius: 12px; margin-bottom: 25px; text-align: left; }
        input { width: 100%; max-width: 300px; padding: 15px; margin: 10px 0; border-radius: 8px; border: 2px solid #333; background: #1a1a2e; color: white; font-size: 1rem; }
        button { width: 100%; max-width: 300px; padding: 15px; background: #00d4ff; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; color: #000; margin-top: 10px; }
        .option-btn { background: #333; color: white; border: 1px solid #00d4ff; margin: 8px 0; }
        .error { color: #ff0055; font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="join-screen" class="screen active">
        <h1>BLUFFI & FAKTA 🎭</h1>
        <input type="number" id="room-input" placeholder="PIN-KOODI" inputmode="numeric">
        <input type="text" id="name-input" placeholder="NIMIMERKKI" maxlength="12">
        <button id="join-btn">LIITY PELIIN</button>
        <div id="join-error" class="error"></div>
    </div>

    <div id="game-screen" class="screen">
        <h2 id="question-text">Odota kysymystä...</h2>
        <input type="text" id="answer-input" placeholder="Kirjoita valheesi..." maxlength="60">
        <button id="submit-btn">LÄHETÄ BLUFFI</button>
    </div>

    <div id="voting-screen" class="screen">
        <h3>MIKÄ ON TOTTA?</h3>
        <div id="options-list"></div>
    </div>

    <div id="wait-screen" class="screen">
        <p>Valmista! Katso TV-ruutua...</p>
    </div>

    <script>
        const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
        const ws = new WebSocket(`${protocol}://${window.location.host}`);
        const safe = (str) => str.replace(/[^a-zA-Z0-9åäöÅÄÖ!?,. ]/g, "").trim();

        window.onload = () => {
    // Luetaan URL:n parametrit (esim. ?room=1234)
    const urlParams = new URLSearchParams(window.location.search);
    const roomFromUrl = urlParams.get('room');
    if (roomFromUrl) {
        document.getElementById('room-input').value = roomFromUrl;
        // Siirretään fokus suoraan nimimerkkiin!
        document.getElementById('name-input').focus();
    }
};

        document.getElementById('join-btn').onclick = () => {
            const room = document.getElementById('room-input').value;
            const name = safe(document.getElementById('name-input').value);
            if(room && name) {
                ws.send(JSON.stringify({ type: 'JOIN_GAME', payload: { roomCode: room, playerName: name } }));
            } else {
                document.getElementById('join-error').innerText = "Täytä koodi ja nimi!";
            }
        };

        ws.onmessage = (event) => {
            const { type, payload } = JSON.parse(event.data);
            if (type === 'JOIN_SUCCESS') showScreen('wait-screen');
            if (type === 'ERROR') document.getElementById('join-error').innerText = payload;
            
            if (type === 'ROLE_ASSIGNED') {
                showScreen('game-screen');
                document.getElementById('question-text').innerText = payload.question;
                document.getElementById('answer-input').value = '';
            }
            
            // KORJAUS 1: Puhelin kuuntelee nyt sanaa START_VOTING!
            if (type === 'START_VOTING') {
                showScreen('voting-screen');
                const list = document.getElementById('options-list');
                list.innerHTML = '';
                payload.answers.forEach(ans => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = ans;
                    btn.onclick = () => {
                        ws.send(JSON.stringify({ type: 'SUBMIT_VOTE', payload: { vote: ans } }));
                        showScreen('wait-screen');
                    };
                    list.appendChild(btn);
                });
            }
        };

        document.getElementById('submit-btn').onclick = () => {
            const ans = safe(document.getElementById('answer-input').value);
            if(ans) {
                ws.send(JSON.stringify({ type: 'SUBMIT_ANSWER', payload: { answer: ans } }));
                showScreen('wait-screen');
            }
        };

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
