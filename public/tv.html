<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bluffi & Fakta - TV</title>
    <style>
        :root {
            --bg-color: #0d0118;
            --text-color: #ffffff;
            --primary-color: #00d4ff;
            --impostor-color: #ff0055;
            --neon-shadow: 0 0 10px rgba(0, 212, 255, 0.7);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh; /* Täysi korkeus */
            width: 100vw;  /* Täysi leveys */
            overflow: hidden; /* Estää skrollauksen */
            display: flex;
            flex-direction: column; /* Järjestää sisällön pystyyn */
            align-items: center;
        }

        /* --- YLÄOSA: LOGO JNE --- */
        header {
            flex: 0 0 auto; /* Ei kasva, ei kutistu */
            padding: 2vh 0; /* Suhteellinen padding korkeuteen */
            text-align: center;
        }

        h1 {
            font-size: 8vh; /* Suhteellinen kirjasinkoko */
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #fff;
            text-shadow: 0 0 10px #ff00e6, 0 0 20px #ff00e6, 0 0 30px #ff00e6;
        }

        /* --- KESKIOSA: SEULA / KYSYMYKSET --- */
        main {
            flex: 1 1 auto; /* Vie kaiken jäljellä olevan tilan */
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Varmistaa ettei sisältö täälläkään skrollaa */
            padding: 0 5vw;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 100%;
            height: 100%;
        }

        .screen.active {
            display: flex;
        }

        /* Lobby asettelu */
        .lobby-container {
            display: flex;
            flex-direction: row; /* Rinnakkain ohjeet ja pelaajat */
            justify-content: center;
            align-items: flex-start;
            gap: 3vw;
            width: 100%;
            height: 100%;
            padding-top: 2vh;
        }

        .instructions-box {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            padding: 2vh 2vw;
            border-radius: 15px;
            text-align: left;
            border: 2px solid var(--primary-color);
            box-shadow: var(--neon-shadow);
        }

        .instructions-box h2 {
            color: var(--primary-color);
            font-size: 4vh;
            margin-bottom: 2vh;
        }

        .instructions-box ol {
            list-style-position: inside;
        }

        .instructions-box ol li {
            font-size: 2.8vh;
            margin-bottom: 1.5vh;
        }

        .player-list-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
        }

        #room-code-display {
            font-size: 10vh;
            font-weight: bold;
            color: var(--primary-color);
            text-shadow: var(--neon-shadow);
            margin: 1vh 0;
        }

        /* --- ALAOSA: PELAAJALISTA JA NAPPI --- */
        footer {
            flex: 0 0 auto; /* Ei kasva, ei kutistu */
            width: 100%;
            padding: 2vh 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(0,0,0,0.2);
        }

        #player-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1vw;
            width: 90%;
            max-height: 15vh; /* Rajoitetaan listan korkeutta */
            overflow-y: auto; /* Jos pelaajia on todella paljon, tämä skrollaa */
            margin-bottom: 2vh;
        }

        .player-tag {
            background: rgba(255, 255, 255, 0.1);
            padding: 1vh 2vw;
            border-radius: 20px;
            font-size: 2.5vh;
        }

        button {
            background: linear-gradient(45deg, #ff00e6, #00d4ff);
            color: white;
            border: none;
            padding: 2vh 4vw;
            font-size: 3vh;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 0, 230, 0.5);
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.95); }

    </style>
</head>
<body>

    <header>
        <h1>BLUFFI & FAKTA</h1>
    </header>

    <main>
        <div id="lobby-screen" class="screen active">
            <div class="lobby-container">
                <div class="instructions-box">
                    <h2>NÄIN PELATAAN:</h2>
                    <ol>
                        <li>Avaa selaimesi puhelimella.</li>
                        <li>Syötä TV:ssä näkyvä koodi.</li>
                        <li>Keksi uskottava <strong>VALHE</strong>.</li>
                        <li>Äänestä! Löydätkö <strong>FAKTAN</strong>?</li>
                    </ol>
                </div>
                
                <div class="player-list-box">
                    <p style="font-size: 3vh;">Liity koodilla:</p>
                    <div id="room-code-display">----</div>
                    <p style="font-size: 2.5vh;">Pelaajat: <span id="player-count">0</span></p>
                </div>
            </div>
        </div>

        </main>

    <footer>
        <div id="player-list">
            </div>
        <button id="start-btn" style="display:none;">ALOITA SHOW</button>
    </footer>

    <script>
        // WS koodit tähän, pysyvät samana kuin aiemmin
    </script>
</body>
</html>
